
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mawartoto - Konversi Toto SGP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:url('https://mariterbang.io/download/LFVvAEcj.jpg') center/cover fixed no-repeat;
    color:#fff;
}
body:before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.72);
    z-index:-1;
}
header{
    background:linear-gradient(90deg,rgba(120,0,0,.9),rgba(0,0,0,.85));
    padding:14px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:2px solid #b40000;
}
.logo img{height:55px}
.login-btn{
    background:linear-gradient(#ff0000,#8b0000);
    color:#fff;
    padding:11px 25px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 12px red;
}
.wrapper{
    max-width:620px;
    margin:70px auto;
    padding:18px;
}
.box{
    background:rgba(5,5,5,.92);
    border:1px solid #b50000;
    border-radius:14px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 25px rgba(255,0,0,.35);
}
.box h1{
    font-size:24px;
    margin-bottom:18px;
    color:#fff;
}
.label{
    font-weight:bold;
    margin-bottom:8px;
}
.input-row{
    display:grid;
    grid-template-columns:repeat(6,1fr) 20px 1fr;
    gap:6px;
    align-items:center;
}
input{
    width:100%;
    height:42px;
    border:none;
    border-radius:5px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}
.plus{
    font-size:25px;
    font-weight:bold;
}
.btn-area{
    margin:15px 0;
}
button{
    border:none;
    padding:10px 18px;
    border-radius:6px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
.convert{background:#009b5a}
.hapus{background:#d60000}
.hasil-title{
    font-size:32px;
    margin-top:10px;
}
.result-box{
    background:linear-gradient(#ff0000,#a50000);
    margin-top:8px;
    padding:8px;
    border-radius:7px;
}
#result{
    font-size:34px;
    color:#000;
    letter-spacing:3px;
}
footer{
    text-align:center;
    padding:18px;
    background:rgba(0,0,0,.75);
    font-size:14px;
}
@media(max-width:600px){
    .logo img{height:42px}
    .wrapper{margin:35px auto}
    .input-row{
        grid-template-columns:repeat(3,1fr);
    }
    .plus{
        display:none;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="https://mawartotobagnaia.com/assets/img/xj/logo.png?v=1777859600" alt="Mawartoto">
    </div>
    <a class="login-btn" href="https://mawartotoaudi.com/register?referral_code=akuntestnn" target="_blank">LOGIN</a>
</header>

<div class="wrapper">
    <div class="box">
        <h1>KONVERSI SINGAPORE MAWARTOTO</h1>

        <div class="label">Winning Numbers</div>

        <form name="fom">
            <div class="input-row">
                <input type="text" id="s1" maxlength="2" oninput="onlyNumber(this, 's2')">
                <input type="text" id="s2" maxlength="2" oninput="onlyNumber(this, 's3')">
                <input type="text" id="s3" maxlength="2" oninput="onlyNumber(this, 's4')">
                <input type="text" id="s4" maxlength="2" oninput="onlyNumber(this, 's5')">
                <input type="text" id="s5" maxlength="2" oninput="onlyNumber(this, 's6')">
                <input type="text" id="s6" maxlength="2" oninput="onlyNumber(this, 's7')">
                <div class="plus">+</div>
                <input type="text" id="s7" maxlength="2" oninput="onlyNumber(this)">
            </div>

            <div class="btn-area">
                <button type="button" class="convert" onclick="convert()">Convert</button>
                <button type="button" class="hapus" onclick="hapus()">Hapus</button>
            </div>

            <div class="hasil-title">Hasil:</div>
            <div class="result-box">
                <div id="result">XXXX</div>
            </div>
        </form>
    </div>
</div>

<footer>
    Copyright © 2026 MAWARTOTO
</footer>

<script>
function onlyNumber(el, nextId){
    el.value = el.value.replace(/[^0-9]/g, '');
    if(el.value.length === 2 && nextId){
        document.getElementById(nextId).focus();
    }
}

function hapus(){
    for(let i = 1; i <= 7; i++){
        document.getElementById('s' + i).value = '';
    }
    document.getElementById('result').innerHTML = 'XXXX';
    document.getElementById('s1').focus();
}

function convert(){
    let s1 = document.getElementById('s1').value;
    let s2 = document.getElementById('s2').value;
    let s3 = document.getElementById('s3').value;
    let s4 = document.getElementById('s4').value;
    let s5 = document.getElementById('s5').value;
    let s6 = document.getElementById('s6').value;
    let s7 = document.getElementById('s7').value;

    if(!s1 || !s2 || !s3 || !s4 || !s5 || !s6 || !s7){
        alert("Harus diisi dengan angka, tidak boleh kosong");
        document.getElementById('s1').focus();
        return;
    }

    let myarray = [s1, s2, s3, s4, s5, s6];
    myarray.sort(function(a,b){return a - b});

    let c = parseInt(myarray[0]) + parseInt(myarray[1]) + parseInt(myarray[2]) + parseInt(myarray[3]) + parseInt(myarray[4]) + parseInt(myarray[5]);
    c = c * 2;
    c = c - parseInt(myarray[0]) - parseInt(myarray[5]);
    c = c + Number(s7);
    c = "" + c;

    if(c.length > 2){
        c = c.substr(1,2);
    }

    let d = c.substr(1);
    c = c.substr(0,1);

    let b = parseInt(myarray[3]) + parseInt(myarray[4]);
    b = "" + b;

    if(b.length > 2){
        b = b.substr(2,1);
    }else{
        b = b.substr(1);
    }

    let a = parseInt(myarray[1]) + parseInt(myarray[2]);
    a = "" + a;

    if(a.length >= 2){
        a = a.substr(1);
    }

    document.getElementById("result").innerHTML = a + "" + b + "" + c + "" + d;
}
</script>

</body>
</html>
